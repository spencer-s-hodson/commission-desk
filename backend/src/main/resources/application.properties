spring.application.name=commissiondesk-api

# PostgreSQL (Docker: docker compose up -d in backend/)
spring.datasource.url=jdbc:postgresql://localhost:5432/commissiondesk
spring.datasource.username=commissiondesk
spring.datasource.password=commissiondesk
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
