services:
  postgres:
    image: postgres:16-alpine
    container_name: commissiondesk-postgres
    environment:
      POSTGRES_USER: commissiondesk
      POSTGRES_PASSWORD: commissiondesk
      POSTGRES_DB: commissiondesk
    ports:
      - "5432:5432"
    volumes:
      - commissiondesk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commissiondesk -d commissiondesk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  commissiondesk_pgdata:
